name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install sqlmesh duckdb
      - name: Unit tests
        run: sqlmesh test
      - name: Build + audits (duckdb + seed fixtures)
        run: sqlmesh plan --auto-apply
