# Copy to config.yaml and fill the connection details. config.yaml is git-ignored.
# This project is designed to run on MySQL ONLY (source consolidated_db + the
# FHIR JSON transforms use MySQL JSON functions). Tests also run on MySQL.
gateways:
  mysql:
    connection:
      type: mysql
      host:
      port: 3310
      user:
      password:
      database: digi_fhir        # writable schema for SQLMesh outputs + state
    test_connection:
      type: mysql
      host:
      port: 3310
      user:
      password:
      database: digi_fhir_test

default_gateway: mysql

model_defaults:
  dialect: mysql

# FHIR system URIs and source identifiers.
# These must align with the OpenCR decisionRules.json system URIs and with
# whatever identifier namespaces the source iSantePlus instance publishes.
# Override per deployment — do not edit the SQL models.
variables:
  national_id_system: http://isanteplus.org/openmrs/fhir2/6-biometrics-national-reference-code
  source_key_system: http://sedish-haiti.org/fhir/source-key
  mspp_site_system: http://sedish-haiti.org/fhir/mspp-site
  drug_system: http://isanteplus.org/openmrs/drug
  phone_attribute_name: "Telephone Number"

disable_anonymized_analytics: true
