# SQLMesh project config.
# Dev/CI runs on DuckDB with seed fixtures (self-contained — no live DB needed).
# Production reads the real consolidated_db (MySQL) — swap the default gateway.

gateways:
  # local dev / CI — fixtures are loaded as SEED models
  duckdb:
    connection:
      type: duckdb
      database: db.db

  # production — read the CHARESS consolidated_db (MySQL). Outputs/state must go
  # to a schema this account can write (NOT the read-only consolidated_db).
  # mysql:
  #   connection:
  #     type: mysql
  #     host: {{ env_var('SRC_HOST') }}
  #     port: 3310
  #     user: {{ env_var('SRC_USER') }}
  #     password: {{ env_var('SRC_PASS') }}
  #     database: digi_etl          # writable schema for SQLMesh outputs + state

default_gateway: duckdb

model_defaults:
  dialect: duckdb       # prod: switch to mysql (JSON funcs differ — see README)
  start: 2026-01-01
  cron: '@daily'

# FHIR system URIs — must align with the MPI (OpenCR) config; provided by CHARESS.
variables:
  national_id_system: http://isanteplus.org/openmrs/fhir2/6-biometrics-national-reference-code

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
